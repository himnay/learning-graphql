spring:
  application:
    name: graphql-service1
  profiles:
    active: local
  output:
    ansi:
      enabled: always
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:graphql_db}
    username: ${POSTGRES_USER:graphql}
    password: ${POSTGRES_PASSWORD:graphql}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: GraphQLHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      locations: classpath:graphql/**
      file-extensions: .graphqls,.gql

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,scheduledtasks
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

shedlock:
  default-lock-at-most-for: 30s
  default-lock-at-least-for: 10s
  student-report:
    cron: "0 */5 * * * *"
    lock-at-most-for: 30s
    lock-at-least-for: 10s

logging:
  level:
    com.org.graphql: DEBUG
    org.flywaydb: INFO
    com.zaxxer.hikari: WARN
